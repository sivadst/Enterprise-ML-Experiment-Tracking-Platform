version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend/metadata.db:/app/metadata.db
      - ./backend/artifacts.db:/app/artifacts.db
    environment:
      - METADATA_DB_URL=sqlite:///./metadata.db
      - ARTIFACTS_DB_URL=sqlite:///./artifacts.db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
